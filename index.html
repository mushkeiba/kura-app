<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<script>
/* キャッシュ対策：_cb が無ければ一意URLで読み直す＝常に最新を取得（GitHub Pagesでも効く） */
(function(){try{var u=new URL(location.href);if(!u.searchParams.has('_cb')){u.searchParams.set('_cb',String(Date.now()));location.replace(u.toString());}}catch(e){}})();
</script>
<title>KURA 予約</title>
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/vuetify@3.7.4/dist/vuetify.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
<style>
  html,body{margin:0;font-family:"Noto Sans JP",sans-serif;}
  .v-application{font-family:"Noto Sans JP",sans-serif !important;}
  .bar{width:5px;border-radius:3px;align-self:stretch;}
  .msgout{white-space:pre-wrap;line-height:1.85;font-size:15px;}
  .ctr{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:14px;text-align:center;padding:24px;}
  /* ボトムナビを4つ均等幅に */
  .v-bottom-navigation__content{justify-content:space-evenly !important;}
  .v-bottom-navigation__content > .v-btn{flex:1 1 0 !important;min-width:0 !important;max-width:none !important;}
  .v-bottom-navigation .v-btn__content{font-size:11px;white-space:nowrap;}
  /* カレンダー */
  .legend{width:15px;height:15px;border-radius:4px;display:inline-block;margin-right:5px;border:1px solid rgba(0,0,0,.12);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cal-dow{margin-bottom:5px;}
  .cal-dowcell{text-align:center;font-size:13px;font-weight:700;padding:2px 0;}
  .cal-cell{min-height:62px;border:1px solid #ECEEF1;border-radius:8px;padding:4px;cursor:pointer;display:flex;flex-direction:column;overflow:hidden;background:#fff;}
  .cal-empty{border:none;background:transparent;cursor:default;}
  .cal-cell:active{filter:brightness(.95);}
  .cal-today{box-shadow:inset 0 0 0 2px #06C755;}
  .cal-conflict{box-shadow:inset 0 0 0 2px #DC2626 !important;}
  .cal-day{font-size:14px;font-weight:700;color:#1F2328;line-height:1.1;}
  .cal-name{font-size:11px;line-height:1.25;font-weight:700;color:#33475b;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cal-sun{color:#DC2626 !important;}
  .cal-sat{color:#1565C0 !important;}
  .cal-air{background:#fde4ec;}
  .cal-book{background:#e3f0fb;}
  .cal-priv{background:#e2f5e8;}
  .cal-stop{background:repeating-linear-gradient(45deg,#eceff1,#eceff1 6px,#dde3e7 6px,#dde3e7 12px);}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vuetify@3.7.4/dist/vuetify.min.js"></script>
<script>
var LIFF_ID='2010467474-F0WkGdDW';
var API='https://script.google.com/macros/s/AKfycbya86LLxu2tq-8br3eWhjcyC0bd1yfkIPD7YR60fATxC1DX5k24xAI7Bs0cmDFNnOE6/exec';
var ID_TOKEN='';
function apiCall(action,params){params=params||{};var q='?action='+encodeURIComponent(action)+'&idToken='+encodeURIComponent(ID_TOKEN);
  Object.keys(params).forEach(function(k){q+='&'+k+'='+encodeURIComponent(params[k]);});
  return fetch(API+q).then(function(r){return r.json();}).then(function(j){if(!j.ok)throw new Error(j.error||'error');return j.data;});}
function p2(n){return (n<10?'0':'')+n;}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function addStr(n){var d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function fmtMd(s){if(!s)return '';var p=String(s).split('-');return p.length===3?(+p[1])+'/'+(+p[2]):s;}
function fmtJaShort(s){if(!s)return '';var p=String(s).split('-');return p.length===3?(+p[1])+'月'+(+p[2])+'日':s;}
function fmtJa(s){if(!s)return '';var p=String(s).split('-');if(p.length!==3)return s;var wd=['日','月','火','水','木','金','土'];var dt=new Date(+p[0],+p[1]-1,+p[2]);return (+p[0])+'年'+(+p[1])+'月'+(+p[2])+'日（'+wd[dt.getDay()]+'）';}

var App={
  data:function(){return{
    ready:false, allowed:false, myId:'', err:'',
    ver:'v20', tab:'today', loading:false, snack:false, snackText:'',
    today:null, res:[], tpl:[],
    detail:null, detailOpen:false, editOpen:false, edit:{},
    add:{type:'予約',name:'',in:todayStr(),out:addStr(1),adults:'2',children:'0',amount:'',phone:'',email:'',notes:''},
    addOpen:false, addBusy:false,
    cal:(function(){var d=new Date();return {y:d.getFullYear(),m:d.getMonth()+1};})(),
    pick:{inOpen:false,outOpen:false,eInOpen:false,eOutOpen:false},
    msg:{uid:'',tpl:'',lang:'ja',code:''}
  };},
  computed:{
    todoList:function(){
      var t=this.today||{};var out=[];
      (t.late||[]).forEach(function(x){out.push({uid:x.uid,title:x.task,sub:x.name,overdue:true,classify:false,done:false});});
      (t.todays||[]).forEach(function(x){out.push({uid:x.uid,title:x.task,sub:x.name,overdue:false,classify:false,done:!!x.done});});
      (t.needsType||[]).forEach(function(x){out.push({uid:x.uid,title:'種別を選ぶ（予約か売り止め）',sub:(x.name||'(名前未入力)')+'　'+x.in+'→'+x.out,overdue:false,classify:true,done:false});});
      return out;
    },
    calLabel:function(){return this.cal.y+'年 '+this.cal.m+'月';},
    calCells:function(){
      // 各夜を覆う予約を集める（泊数ベース：IN〜OUT前日。OUT当日は空き）
      var cover={};
      this.res.forEach(function(r){
        if(r.cancelled||!r.in||!r.out)return;
        var ip=String(r.in).split('-'),op=String(r.out).split('-');
        if(ip.length!==3||op.length!==3)return;
        var d=new Date(+ip[0],+ip[1]-1,+ip[2]),end=new Date(+op[0],+op[1]-1,+op[2]);
        var guard=0;
        while(d<end&&guard<400){var k=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());(cover[k]=cover[k]||[]).push(r);d.setDate(d.getDate()+1);guard++;}
      });
      // 優先：実予約>売り止め。予約が2件以上重なったら本当の重複＝conflict
      var occ={};
      Object.keys(cover).forEach(function(k){
        var arr=cover[k];
        var bk=arr.filter(function(x){return x.type==='予約';});
        if(bk.length)occ[k]={r:bk[0],conflict:bk.length>1};
        else occ[k]={r:arr[0],conflict:false};
      });
      var first=new Date(this.cal.y,this.cal.m-1,1);
      var lead=first.getDay();
      var dim=new Date(this.cal.y,this.cal.m,0).getDate();
      var cells=[],i;
      for(i=0;i<lead;i++)cells.push(null);
      for(var day=1;day<=dim;day++){
        var k=this.cal.y+'-'+p2(this.cal.m)+'-'+p2(day);
        var o=occ[k]||null;
        cells.push({day:day,date:k,r:o?o.r:null,conflict:o?o.conflict:false,start:!!(o&&o.r.in===k),today:k===todayStr()});
      }
      return cells;
    },
    upcoming:function(){var t=todayStr();return this.res.filter(function(r){return !r.cancelled&&r.out>=t;}).sort(function(a,b){return String(a.in).localeCompare(String(b.in));});},
    past:function(){var t=todayStr();return this.res.filter(function(r){return !r.cancelled&&r.out<t;}).sort(function(a,b){return String(b.in).localeCompare(String(a.in));}).slice(0,20);},
    needsReview:function(){return this.res.filter(function(r){return !r.cancelled&&!String(r.type||'').trim();}).sort(function(a,b){return String(a.in).localeCompare(String(b.in));});},
    bookings:function(){return this.res.filter(function(r){return !r.cancelled&&r.type==='予約';}).sort(function(a,b){return String(a.in).localeCompare(String(b.in));});},
    blocks:function(){return this.res.filter(function(r){return !r.cancelled&&(r.type==='売り止め'||r.type==='ブロック');}).sort(function(a,b){return String(a.in).localeCompare(String(b.in));});},
    msgGuests:function(){return this.res.filter(function(r){return !r.cancelled&&r.type!=='売り止め'&&r.type!=='ブロック';}).sort(function(a,b){return String(a.in).localeCompare(String(b.in));});},
    msgText:function(){
      if(!this.msg.uid||!this.msg.tpl)return 'お客さんと文例を選んでください';
      var r=this.findRes(this.msg.uid),t=this.tpl.filter(function(x){return x.name===this.msg.tpl;}.bind(this))[0];
      if(!r||!t)return '—';
      var body=(this.msg.lang==='en')?(t.en||''):(t.ja||'');var nm=r.name||'お客';var c=this.msg.code||'____';
      return body.replace(/\{お客さん名\}/g,nm).replace(/\{guest name\}/g,nm)
        .replace(/\{IN日\}/g,fmtJaShort(r.in)).replace(/\{check-in date\}/g,fmtMd(r.in))
        .replace(/\{OUT日\}/g,fmtJaShort(r.out)).replace(/\{check-out date\}/g,fmtMd(r.out))
        .replace(/\{暗証番号\}/g,c).replace(/\{door code\}/g,c);
    }
  },
  watch:{ tab:function(v){ if(v==='today')this.loadToday(); else if(v==='list'||v==='msg'||v==='calendar')this.ensureRes(v); } },
  methods:{
    fmtMd:fmtMd, fmtJa:fmtJa, fmtJaShort:fmtJaShort,
    toast:function(m){this.snackText=m;this.snack=true;},
    chColor:function(r){if(r.type==='売り止め'||r.type==='ブロック')return 'grey';if(r.channel==='エアビー')return 'pink-darken-1';if(r.channel==='ブッキング')return 'blue-darken-2';return 'green-darken-1';},
    chLabel:function(r){if(r.type==='売り止め'||r.type==='ブロック')return '売り止め';if(r.channel==='エアビー')return 'Airbnb';if(r.channel==='ブッキング')return 'Booking';return '個人';},
    findRes:function(uid){return this.res.filter(function(r){return r.uid===uid;})[0];},
    loadToday:function(){var s=this;s.loading=true;apiCall('today',{}).then(function(d){s.today=d;s.loading=false;}).catch(function(e){s.loading=false;s.toast('エラー: '+e.message);});},
    ensureRes:function(which){var s=this;if(s.res.length){if(which==='msg'&&!s.tpl.length)s.loadTpl();return;}s.loading=true;
      var jobs=[apiCall('list',{})];if(which==='msg')jobs.push(apiCall('templates',{}));
      Promise.all(jobs).then(function(a){s.res=a[0].items||[];if(a[1])s.tpl=a[1].items||[];s.loading=false;}).catch(function(e){s.loading=false;s.toast('エラー: '+e.message);});},
    loadTpl:function(){var s=this;apiCall('templates',{}).then(function(d){s.tpl=d.items||[];});},
    refreshRes:function(cb){var s=this;apiCall('list',{}).then(function(d){s.res=d.items||[];if(cb)cb();});},
    toggleToday:function(t){var s=this;if(!t.uid){s.toast('更新できません');return;}var nv=!t.done;t.done=nv;s.toast(nv?'完了にしました':'戻しました');
      apiCall('toggleTask',{uid:t.uid,taskKey:t.col,value:nv}).then(function(){s.loadToday();}).catch(function(e){t.done=!nv;s.toast('エラー: '+e.message);});},
    channelName:function(c){if(c==='エアビー')return 'Airbnb';if(c==='ブッキング')return 'Booking';if(c==='手動')return '個人';return c||'';},
    calStep:function(n){var m=this.cal.m+n,y=this.cal.y;if(m<1){m=12;y--;}if(m>12){m=1;y++;}this.cal={y:y,m:m};},
    mediaClass:function(r){if(!r)return '';if(r.type==='売り止め'||r.type==='ブロック')return 'cal-stop';if(r.channel==='エアビー')return 'cal-air';if(r.channel==='ブッキング')return 'cal-book';return 'cal-priv';},
    dowColor:function(i){var d=i%7;return d===0?'cal-sun':(d===6?'cal-sat':'');},
    cellName:function(r){if(!r)return '';return (r.type==='売り止め'||r.type==='ブロック')?'売り止め':(r.name||'予約');},
    onDay:function(c){if(!c)return;if(c.r)this.openDetail(c.r.uid);else this.openAddFor(c.date);},
    openAddFor:function(date){this.add={type:'予約',name:'',in:date,out:this.addDays(date,1),adults:'2',children:'0',amount:'',phone:'',email:'',notes:''};this.addOpen=true;},
    addDays:function(s,n){var p=String(s).split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());},
    toDateObj:function(s){if(!s)return null;var p=String(s).split('-');if(p.length!==3)return null;return new Date(+p[0],+p[1]-1,+p[2]);},
    ymd:function(d){if(!d)return '';if(Array.isArray(d))d=d[0];return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());},
    onPickIn:function(d){var s=this.ymd(d);this.add.in=s;if(!this.add.out||this.add.out<=s)this.add.out=this.addDays(s,1);this.pick.inOpen=false;},
    onPickOut:function(d){this.add.out=this.ymd(d);this.pick.outOpen=false;},
    onPickEditIn:function(d){this.edit.in=this.ymd(d);this.pick.eInOpen=false;},
    onPickEditOut:function(d){this.edit.out=this.ymd(d);this.pick.eOutOpen=false;},
    openDetail:function(uid){var s=this;var r=s.findRes(uid);if(r){s.detail=r;s.detailOpen=true;return;}
      apiCall('list',{}).then(function(d){s.res=d.items||[];var r2=s.findRes(uid);if(r2){s.detail=r2;s.detailOpen=true;}else s.toast('見つかりません');});},
    detailTasks:function(r){var defs=[['予約お礼','予約お礼を送る'],['7日前','7日前メッセ'],['前日','前日メッセ（入り方）'],['宿泊お礼','宿泊お礼'],['清掃済','清掃']];
      return defs.map(function(d){return {col:d[0],label:d[1],done:!!(r.tasks&&r.tasks[d[0]])};});},
    toggleDetail:function(r,col){var s=this;var done=!!(r.tasks&&r.tasks[col]);if(r.tasks)r.tasks[col]=!done;
      apiCall('toggleTask',{uid:r.uid,taskKey:col,value:!done}).then(function(){}).catch(function(e){if(r.tasks)r.tasks[col]=done;s.toast('エラー: '+e.message);});},
    setType:function(uid,type){var s=this;s.toast(type+'にしました');apiCall('update',{payload:JSON.stringify({uid:uid,patch:{'種別':type}})}).then(function(){s.refreshRes(function(){s.detail=s.findRes(uid);});}).catch(function(e){s.toast('エラー: '+e.message);});},
    openEdit:function(){var r=this.detail;this.edit={uid:r.uid,type:r.type||'予約',name:r.name||'',in:r.in||'',out:r.out||'',adults:r.adults||'',amount:r.amount||'',phone:r.phone||'',email:r.email||'',lastContact:r.lastContact||'',notes:r.notes||''};this.editOpen=true;},
    saveEdit:function(){var s=this;var e=s.edit;var patch={'種別':e.type,'お客さん名':e.name,'IN':e.in,'OUT':e.out,'人数':e.adults,'金額':e.amount,'電話':e.phone,'メール':e.email,'最終やりとり日':e.lastContact,'メモ':e.notes};
      s.toast('保存中…');apiCall('update',{payload:JSON.stringify({uid:e.uid,patch:patch})}).then(function(){s.refreshRes(function(){s.detail=s.findRes(e.uid);s.editOpen=false;s.toast('保存しました');});}).catch(function(err){s.toast('エラー: '+err.message);});},
    cancelRes:function(){var s=this;var uid=s.detail.uid;apiCall('update',{payload:JSON.stringify({uid:uid,patch:{'キャンセル':true}})}).then(function(){s.toast('キャンセルにしました');s.editOpen=false;s.detailOpen=false;s.refreshRes();}).catch(function(e){s.toast('エラー: '+e.message);});},
    submitAdd:function(){var s=this;var a=s.add;var stop=(a.type==='売り止め');
      if(!a.in||!a.out){s.toast('IN/OUTを入力してください');return;}
      if(!stop&&!a.name.trim()){s.toast('お客さん名を入力してください');return;}
      s.addBusy=true;var payload={entry_type:a.type,check_in:a.in,check_out:a.out,guest_name:a.name,num_adults:a.adults,amount:a.amount,phone:a.phone,email:a.email,notes:a.notes,block_reason:a.notes};
      apiCall('add',{payload:JSON.stringify(payload)}).then(function(res){s.addBusy=false;s.addOpen=false;s.toast('登録しました ✓');
        s.refreshRes(function(){s.openDetail(res.uid);});}).catch(function(e){s.addBusy=false;s.toast('エラー: '+e.message);});},
    openMsgFor:function(uid){var s=this;s.tab='msg';s.msg.uid=uid;this.$nextTick(function(){s.ensureRes('msg');});this.detailOpen=false;},
    copyMsg:function(){var s=this;var txt=this.msgText;
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){s.toast('コピーしました ✓');},function(){s.fallbackCopy(txt);});}else s.fallbackCopy(txt);},
    fallbackCopy:function(txt){var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');this.toast('コピーしました ✓');}catch(e){this.toast('コピー失敗');}document.body.removeChild(ta);},
    boot:function(){var s=this;
      liff.init({liffId:LIFF_ID}).then(function(){
        if(!liff.isLoggedIn()){liff.login();return;}
        ID_TOKEN=liff.getIDToken();
        apiCall('whoami',{}).then(function(me){s.myId=me.userId;s.allowed=me.allowed;s.ready=true;if(me.allowed)s.loadToday();}).catch(function(e){s.err=e.message;s.ready=true;});
      }).catch(function(e){s.err='LIFF初期化エラー: '+e.message;s.ready=true;});}
  },
  mounted:function(){this.boot();},
  template:'#tpl'
};

// テンプレート(#tpl)はこのスクリプトより後ろにあるので、DOM読み込み完了を待ってからmount
document.addEventListener('DOMContentLoaded', function(){
  var vuetify=Vuetify.createVuetify({
    locale:{ locale:'ja' },
    theme:{defaultTheme:'kura',themes:{kura:{dark:false,colors:{
      primary:'#06C755', secondary:'#05a948', surface:'#FFFFFF', background:'#F5F7F8',
      error:'#DC2626', warning:'#B7791F'
    }}}},
    defaults:{ VCard:{rounded:'lg', flat:true, border:true}, VBtn:{rounded:'lg'} }
  });
  Vue.createApp(App).use(vuetify).mount('#app');
});
</script>

<!-- Vue テンプレート -->
<script type="text/x-template" id="tpl">
<v-app>
  <!-- 未ログイン処理中 -->
  <div v-if="!ready" class="ctr">
    <v-progress-circular indeterminate color="primary" size="44"></v-progress-circular>
    <div style="color:#6B7280">読み込み中…</div>
  </div>

  <!-- エラー -->
  <div v-else-if="err" class="ctr">
    <v-icon size="46" color="warning">mdi-alert-circle-outline</v-icon>
    <div style="color:#6B7280">{{ err }}</div>
    <v-btn color="primary" @click="boot">再読み込み</v-btn>
  </div>

  <!-- 未許可 -->
  <div v-else-if="!allowed" class="ctr">
    <v-icon size="46" color="primary">mdi-lock-outline</v-icon>
    <div style="font-weight:700;font-size:18px">登録が必要です</div>
    <div style="color:#6B7280">下のIDを森本さんに伝えてください</div>
    <v-card variant="tonal" color="primary" class="pa-4" style="word-break:break-all">
      <div style="font-size:12px;color:#6B7280">あなたのLINE ID</div>
      <div style="font-size:18px;font-weight:700">{{ myId }}</div>
    </v-card>
  </div>

  <!-- 本体 -->
  <template v-else>
    <v-app-bar flat border density="comfortable" style="background:#FFFFFF">
      <v-app-bar-title style="font-weight:700;color:#1F2328;letter-spacing:.02em">
        <span v-if="tab==='today'">今日のやること</span>
        <span v-else-if="tab==='list'">予約一覧</span>
        <span v-else-if="tab==='add'">予約を追加</span>
        <span v-else>メッセージ</span>
        <span class="text-caption text-disabled ml-2" style="font-weight:400">{{ ver }}</span>
      </v-app-bar-title>
      <v-btn v-if="tab==='today'" icon="mdi-refresh" variant="text" color="medium-emphasis" @click="loadToday"></v-btn>
    </v-app-bar>

    <v-main style="background:#FAFAFA">
      <v-progress-linear v-if="loading" indeterminate color="primary"></v-progress-linear>
      <v-window v-model="tab" :touch="false">

        <!-- 今日 -->
        <v-window-item value="today">
          <v-container>
            <div v-if="today">
              <div style="font-size:20px;font-weight:700;margin:4px 4px 12px">{{ fmtJa(today.date) }}</div>

              <!-- 新規予約（24時間以内） -->
              <v-alert v-if="today.newRes && today.newRes.length" color="primary" variant="tonal" density="comfortable" class="mb-4" rounded="lg" icon="mdi-bell-ring-outline">
                <div class="font-weight-bold mb-1">新規予約がありました（{{ today.newRes.length }}件）</div>
                <div v-for="n in today.newRes" :key="n.uid" class="text-body-2 py-1" style="cursor:pointer" @click="openDetail(n.uid)">
                  ・{{ n.name }}　{{ n.in }}→{{ n.out }}（{{ channelName(n.channel) }}）
                </div>
              </v-alert>

              <div class="text-medium-emphasis text-caption font-weight-bold mb-2 ml-1" style="letter-spacing:.08em">今やること</div>
              <v-card v-if="!todoList.length"><v-card-text class="text-center text-medium-emphasis py-8">今やることはありません 🎉</v-card-text></v-card>
              <v-card v-else>
                <v-list lines="two" density="comfortable">
                  <template v-for="(t,i) in todoList" :key="i">
                    <v-list-item @click="openDetail(t.uid)">
                      <template #prepend>
                        <v-avatar :color="t.classify?'warning':(t.done?'primary':'grey-lighten-2')" size="36">
                          <v-icon color="white">{{ t.classify?'mdi-help':(t.done?'mdi-check':'mdi-circle-outline') }}</v-icon>
                        </v-avatar>
                      </template>
                      <v-list-item-title class="d-flex align-center" style="gap:6px;min-width:0">
                        <span class="text-truncate" :class="t.done?'text-decoration-line-through text-medium-emphasis':'font-weight-medium'">{{ t.title }}</span>
                        <v-chip v-if="t.overdue" size="x-small" color="error" variant="flat" class="flex-shrink-0">遅れ</v-chip>
                      </v-list-item-title>
                      <v-list-item-subtitle>{{ t.sub }}</v-list-item-subtitle>
                      <template #append><v-icon color="grey-lighten-1">mdi-chevron-right</v-icon></template>
                    </v-list-item>
                    <v-divider v-if="i<todoList.length-1"></v-divider>
                  </template>
                </v-list>
              </v-card>

              <div class="text-medium-emphasis text-caption font-weight-bold mb-2 ml-1 mt-5" style="letter-spacing:.08em">直近のイベント</div>
              <v-card elevation="1">
                <v-list density="comfortable">
                  <v-list-item>
                    <div class="text-caption text-medium-emphasis">今日チェックイン</div>
                    <div class="text-body-1 font-weight-bold">{{ today.todayIn.length?today.todayIn.join('、'):'なし' }}</div>
                  </v-list-item>
                  <v-divider></v-divider>
                  <v-list-item>
                    <div class="text-caption text-medium-emphasis">今日チェックアウト</div>
                    <div class="text-body-1 font-weight-bold">{{ today.todayOut.length?today.todayOut.join('、'):'なし' }}</div>
                  </v-list-item>
                  <v-divider></v-divider>
                  <v-list-item>
                    <div class="text-caption text-medium-emphasis">次のチェックイン</div>
                    <div class="text-body-1 font-weight-bold" style="white-space:normal">
                      <span v-if="today.nextIn">{{ today.nextIn.name }}<span class="text-medium-emphasis font-weight-regular text-body-2">　{{ today.nextIn.date }}（あと{{ today.nextIn.d }}日）</span></span>
                      <span v-else>予定なし</span>
                    </div>
                  </v-list-item>
                </v-list>
              </v-card>
            </div>
          </v-container>
        </v-window-item>

        <!-- 予約一覧 -->
        <v-window-item value="list">
          <v-container>
            <!-- 要確認アラート -->
            <v-alert v-if="needsReview.length" type="warning" variant="tonal" density="comfortable" class="mb-4" rounded="lg">
              <span class="font-weight-bold">{{ needsReview.length }}件</span>、種別が未設定です。タップして「予約」か「売り止め」を選んでください。
            </v-alert>

            <!-- 要確認 -->
            <template v-if="needsReview.length">
              <div class="text-warning text-caption font-weight-bold mb-2 ml-1" style="letter-spacing:.08em">要確認</div>
              <v-card class="mb-5" style="border-color:#E8C97A">
                <v-list>
                  <template v-for="(r,i) in needsReview" :key="r.uid">
                    <v-list-item @click="openDetail(r.uid)" style="background:#FFFBF0">
                      <template #prepend><v-icon color="warning">mdi-alert-circle-outline</v-icon></template>
                      <v-list-item-title class="font-weight-bold d-flex align-center" style="gap:6px">
                        <span>{{ fmtMd(r.in) }} → {{ fmtMd(r.out) }}</span>
                        <v-chip size="x-small" :color="chColor(r)" variant="flat" class="flex-shrink-0">{{ chLabel(r) }}</v-chip>
                      </v-list-item-title>
                      <v-list-item-subtitle>種別と名前を入れてください</v-list-item-subtitle>
                      <template #append><v-icon color="grey">mdi-chevron-right</v-icon></template>
                    </v-list-item>
                    <v-divider v-if="i<needsReview.length-1"></v-divider>
                  </template>
                </v-list>
              </v-card>
            </template>

            <!-- 予約 -->
            <div class="text-medium-emphasis text-caption font-weight-bold mb-2 ml-1" style="letter-spacing:.08em">予約</div>
            <v-card v-if="!bookings.length" class="mb-5"><v-card-text class="text-center text-medium-emphasis py-6">予約はありません</v-card-text></v-card>
            <v-card v-else class="mb-5"><v-list lines="two">
              <template v-for="(r,i) in bookings" :key="r.uid">
                <v-list-item @click="openDetail(r.uid)">
                  <template #prepend>
                    <v-avatar size="40" :color="chColor(r)" variant="tonal">
                      <span class="font-weight-bold">{{ (r.name||'?').slice(0,1) }}</span>
                    </v-avatar>
                  </template>
                  <v-list-item-title class="font-weight-bold d-flex align-center" style="gap:6px;min-width:0">
                    <span class="text-truncate">{{ r.name||'お名前未設定' }}</span>
                    <v-chip size="x-small" :color="chColor(r)" variant="flat" class="flex-shrink-0">{{ chLabel(r) }}</v-chip>
                    <v-chip v-if="r.isNew" size="x-small" color="error" variant="flat" class="flex-shrink-0">NEW</v-chip>
                  </v-list-item-title>
                  <v-list-item-subtitle class="mt-1">
                    <span class="text-body-2 text-high-emphasis">{{ fmtMd(r.in) }} → {{ fmtMd(r.out) }}</span>
                    <span class="text-medium-emphasis ml-3"><v-icon size="13" class="mr-1">mdi-bed-outline</v-icon>{{ r.nights }}泊</span>
                    <span v-if="r.adults" class="text-medium-emphasis ml-3"><v-icon size="13" class="mr-1">mdi-account-outline</v-icon>{{ r.adults }}名</span>
                  </v-list-item-subtitle>
                  <template #append><v-icon color="grey">mdi-chevron-right</v-icon></template>
                </v-list-item>
                <v-divider v-if="i<bookings.length-1"></v-divider>
              </template>
            </v-list></v-card>

            <!-- 売り止め -->
            <template v-if="blocks.length">
              <div class="text-medium-emphasis text-caption font-weight-bold mb-2 ml-1" style="letter-spacing:.08em">売り止め</div>
              <v-card><v-list bg-color="grey-lighten-4">
                <template v-for="(r,i) in blocks" :key="r.uid">
                  <v-list-item @click="openDetail(r.uid)">
                    <template #prepend><v-icon color="grey">mdi-cancel</v-icon></template>
                    <v-list-item-title class="text-medium-emphasis font-weight-medium">売り止め</v-list-item-title>
                    <v-list-item-subtitle>{{ fmtMd(r.in) }}→{{ fmtMd(r.out) }}<span v-if="r.notes">・{{ r.notes }}</span></v-list-item-subtitle>
                    <template #append><v-icon color="grey">mdi-chevron-right</v-icon></template>
                  </v-list-item>
                  <v-divider v-if="i<blocks.length-1"></v-divider>
                </template>
              </v-list></v-card>
            </template>
          </v-container>
        </v-window-item>

        <!-- カレンダー -->
        <v-window-item value="calendar">
          <v-container>
            <div class="d-flex align-center justify-space-between mb-3">
              <v-btn icon="mdi-chevron-left" variant="text" @click="calStep(-1)"></v-btn>
              <div class="text-h6 font-weight-bold">{{ calLabel }}</div>
              <v-btn icon="mdi-chevron-right" variant="text" @click="calStep(1)"></v-btn>
            </div>

            <div class="d-flex flex-wrap mb-3" style="gap:6px 14px">
              <span class="d-flex align-center text-caption"><span class="legend cal-air"></span>Airbnb</span>
              <span class="d-flex align-center text-caption"><span class="legend cal-book"></span>Booking</span>
              <span class="d-flex align-center text-caption"><span class="legend cal-priv"></span>個人</span>
              <span class="d-flex align-center text-caption"><span class="legend cal-stop"></span>売り止め</span>
            </div>

            <div class="cal-grid cal-dow">
              <div v-for="(w,i) in ['日','月','火','水','木','金','土']" :key="w" class="cal-dowcell" :class="i===0?'cal-sun':(i===6?'cal-sat':'text-medium-emphasis')">{{ w }}</div>
            </div>
            <div class="cal-grid">
              <template v-for="(c,i) in calCells" :key="i">
                <div v-if="!c" class="cal-cell cal-empty"></div>
                <div v-else class="cal-cell" :class="[mediaClass(c.r),{'cal-today':c.today,'cal-conflict':c.conflict}]" @click="onDay(c)">
                  <div class="cal-day" :class="dowColor(i)">{{ c.day }}</div>
                  <div v-if="c.start" class="cal-name">{{ cellName(c.r) }}</div>
                </div>
              </template>
            </div>
            <div class="text-caption text-medium-emphasis text-center mt-4 mb-1">白い日（空き）をタップ → 予約・売り止めを登録</div>
            <div class="text-caption text-error text-center" v-if="calCells.some(function(c){return c&&c.conflict;})">⚠️ 赤枠は予約が重複しています。確認してください</div>
          </v-container>
        </v-window-item>

        <!-- メッセージ -->
        <v-window-item value="msg">
          <v-container>
            <v-card class="pa-4">
              <v-select v-model="msg.uid" :items="msgGuests.map(function(r){return {title:(r.name||'(名前未入力)')+'（'+fmtMd(r.in)+'）',value:r.uid};})" label="お客さん" variant="outlined" density="comfortable"></v-select>
              <v-select v-model="msg.tpl" :items="tpl.map(function(t){return t.name;})" label="文例" variant="outlined" density="comfortable"></v-select>
              <v-select v-model="msg.lang" :items="[{title:'日本語',value:'ja'},{title:'English',value:'en'}]" label="言語" variant="outlined" density="comfortable"></v-select>
              <v-text-field v-model="msg.code" label="暗証番号（前日メッセ用）" variant="outlined" density="comfortable"></v-text-field>
              <div class="text-caption text-medium-emphasis mt-2 mb-1">↓ 完成メッセージ</div>
              <v-sheet border rounded class="pa-4 msgout">{{ msgText }}</v-sheet>
              <v-btn color="primary" block size="large" class="mt-4" prepend-icon="mdi-content-copy" @click="copyMsg">コピーする</v-btn>
            </v-card>
          </v-container>
        </v-window-item>

      </v-window>
    </v-main>

    <!-- 詳細ダイアログ（下からせり上がり） -->
    <v-dialog v-model="detailOpen" fullscreen transition="dialog-bottom-transition">
      <v-card v-if="detail" rounded="0" border="0">
        <v-toolbar flat border density="comfortable" style="background:#FFFFFF">
          <v-btn icon="mdi-chevron-down" variant="text" @click="detailOpen=false"></v-btn>
          <v-toolbar-title style="font-weight:700;color:#1F2328">{{ detail.name||'(名前未入力)' }}</v-toolbar-title>
          <v-btn variant="text" color="primary" @click="openEdit">編集</v-btn>
        </v-toolbar>
        <v-card-text style="background:#FAFAFA">
          <v-alert v-if="!String(detail.type||'').trim()" type="warning" variant="tonal" density="comfortable" class="mb-3" rounded="lg">
            <div class="mb-2 font-weight-bold">種別が未設定です</div>
            <div class="d-flex" style="gap:8px">
              <v-btn color="primary" variant="flat" size="small" @click="setType(detail.uid,'予約')">予約にする</v-btn>
              <v-btn variant="outlined" size="small" @click="setType(detail.uid,'売り止め')">売り止めにする</v-btn>
            </div>
          </v-alert>
          <v-chip :color="chColor(detail)" variant="flat" size="small" class="mb-3">{{ chLabel(detail) }}</v-chip>
          <v-card class="mb-4">
            <v-list density="comfortable" bg-color="transparent">
              <v-list-item title="日程" :subtitle="fmtMd(detail.in)+' → '+fmtMd(detail.out)+'（'+detail.nights+'泊）'"></v-list-item>
              <template v-if="detail.type!=='売り止め'">
                <v-list-item title="人数" :subtitle="(detail.adults||'-')+'名'"></v-list-item>
                <v-list-item title="金額" :subtitle="detail.amount?('¥'+Number(detail.amount).toLocaleString()):'-'"></v-list-item>
                <v-list-item v-if="detail.phone" title="電話" :subtitle="detail.phone"></v-list-item>
                <v-list-item v-if="detail.email" title="メール" :subtitle="detail.email"></v-list-item>
              </template>
              <v-list-item v-if="detail.lastContact" title="最終やりとり" :subtitle="detail.lastContact"></v-list-item>
            </v-list>
          </v-card>

          <template v-if="detail.type!=='売り止め'">
            <div class="text-medium-emphasis text-caption font-weight-bold mb-1">✅ やること</div>
            <v-card class="mb-4">
              <v-list>
                <v-list-item v-for="t in detailTasks(detail)" :key="t.col" @click="toggleDetail(detail,t.col)">
                  <template #prepend><v-checkbox-btn :model-value="t.done" color="primary"></v-checkbox-btn></template>
                  <v-list-item-title :class="t.done?'text-decoration-line-through text-medium-emphasis':''">{{ t.label }}</v-list-item-title>
                </v-list-item>
              </v-list>
            </v-card>

            <div class="text-medium-emphasis text-caption font-weight-bold mb-1">📝 メモ</div>
            <v-card class="mb-4"><v-card-text style="white-space:pre-wrap" :class="detail.notes?'':'text-medium-emphasis'">{{ detail.notes||'（メモなし）' }}</v-card-text></v-card>

            <div class="d-flex" style="gap:10px">
              <v-btn color="primary" variant="outlined" size="large" style="flex:1" prepend-icon="mdi-pencil" @click="openEdit">編集</v-btn>
              <v-btn color="primary" size="large" style="flex:1" prepend-icon="mdi-email-outline" @click="openMsgFor(detail.uid)">メッセージ</v-btn>
            </div>
          </template>
          <v-btn v-if="detail.type==='売り止め'" color="primary" variant="outlined" block size="large" prepend-icon="mdi-pencil" @click="openEdit">編集</v-btn>
        </v-card-text>
      </v-card>
    </v-dialog>

    <!-- 編集ダイアログ -->
    <v-dialog v-model="editOpen" fullscreen transition="dialog-bottom-transition">
      <v-card v-if="detail" rounded="0" border="0">
        <v-toolbar flat border density="comfortable" style="background:#FFFFFF">
          <v-btn icon="mdi-chevron-down" variant="text" @click="editOpen=false"></v-btn>
          <v-toolbar-title style="font-weight:700;color:#1F2328">編集</v-toolbar-title>
        </v-toolbar>
        <v-card-text style="background:#FAFAFA">
          <div class="text-caption text-medium-emphasis mb-1">種別</div>
          <v-btn-toggle v-model="edit.type" mandatory divided color="primary" class="mb-4" style="width:100%">
            <v-btn value="予約" style="flex:1">予約</v-btn>
            <v-btn value="売り止め" style="flex:1">売り止め</v-btn>
          </v-btn-toggle>
          <v-text-field v-model="edit.name" label="お客さん名" variant="outlined" density="comfortable"></v-text-field>
          <v-row dense>
            <v-col cols="6"><v-text-field :model-value="fmtJaShort(edit.in)" label="チェックイン" readonly variant="outlined" density="comfortable" prepend-inner-icon="mdi-calendar" @click="pick.eInOpen=true"></v-text-field></v-col>
            <v-col cols="6"><v-text-field :model-value="fmtJaShort(edit.out)" label="チェックアウト" readonly variant="outlined" density="comfortable" prepend-inner-icon="mdi-calendar" @click="pick.eOutOpen=true"></v-text-field></v-col>
          </v-row>
          <v-row dense>
            <v-col cols="6"><v-text-field v-model="edit.adults" label="人数" type="number" variant="outlined" density="comfortable"></v-text-field></v-col>
            <v-col cols="6"><v-text-field v-model="edit.amount" label="金額" type="number" variant="outlined" density="comfortable"></v-text-field></v-col>
          </v-row>
          <v-text-field v-model="edit.phone" label="電話" variant="outlined" density="comfortable"></v-text-field>
          <v-text-field v-model="edit.email" label="メール" variant="outlined" density="comfortable"></v-text-field>
          <v-text-field v-model="edit.lastContact" label="最終やりとり日 (YYYY-MM-DD)" variant="outlined" density="comfortable"></v-text-field>
          <v-textarea v-model="edit.notes" label="メモ" variant="outlined" rows="3"></v-textarea>
          <v-btn color="primary" block size="large" @click="saveEdit">保存</v-btn>
          <v-btn color="error" variant="outlined" block size="large" class="mt-3" @click="cancelRes">この予約をキャンセル</v-btn>
        </v-card-text>
      </v-card>
    </v-dialog>

    <!-- 新規登録ダイアログ（カレンダーの空き日タップから） -->
    <v-dialog v-model="addOpen" fullscreen transition="dialog-bottom-transition">
      <v-card rounded="0" border="0">
        <v-toolbar flat border density="comfortable" style="background:#FFFFFF">
          <v-btn icon="mdi-chevron-down" variant="text" @click="addOpen=false"></v-btn>
          <v-toolbar-title style="font-weight:700;color:#1F2328">新規登録</v-toolbar-title>
        </v-toolbar>
        <v-card-text style="background:#FAFAFA">
          <div class="text-caption text-medium-emphasis mb-1">種別</div>
          <v-btn-toggle v-model="add.type" mandatory divided color="primary" class="mb-4" style="width:100%">
            <v-btn value="予約" style="flex:1">お客さんの予約</v-btn>
            <v-btn value="売り止め" style="flex:1">売り止め</v-btn>
          </v-btn-toggle>
          <v-text-field v-if="add.type==='予約'" v-model="add.name" label="お客さん名 *" variant="outlined" density="comfortable"></v-text-field>
          <v-row dense>
            <v-col cols="6"><v-text-field :model-value="fmtJaShort(add.in)" label="チェックイン" readonly variant="outlined" density="comfortable" prepend-inner-icon="mdi-calendar" @click="pick.inOpen=true"></v-text-field></v-col>
            <v-col cols="6"><v-text-field :model-value="fmtJaShort(add.out)" label="チェックアウト" readonly variant="outlined" density="comfortable" prepend-inner-icon="mdi-calendar" @click="pick.outOpen=true"></v-text-field></v-col>
          </v-row>
          <template v-if="add.type==='予約'">
            <v-row dense>
              <v-col cols="6"><v-text-field v-model="add.adults" label="大人 *" type="number" variant="outlined" density="comfortable"></v-text-field></v-col>
              <v-col cols="6"><v-text-field v-model="add.amount" label="金額" type="number" variant="outlined" density="comfortable"></v-text-field></v-col>
            </v-row>
            <v-text-field v-model="add.phone" label="電話" variant="outlined" density="comfortable"></v-text-field>
            <v-text-field v-model="add.email" label="メール" variant="outlined" density="comfortable"></v-text-field>
          </template>
          <v-textarea v-model="add.notes" :label="add.type==='売り止め'?'メモ（理由）':'メモ'" variant="outlined" rows="3"></v-textarea>
          <v-btn color="primary" block size="large" :loading="addBusy" @click="submitAdd">登録する</v-btn>
        </v-card-text>
      </v-card>
    </v-dialog>

    <!-- 日付ピッカー（共通） -->
    <v-dialog v-model="pick.inOpen" width="auto"><v-date-picker :model-value="toDateObj(add.in)" @update:model-value="onPickIn" color="primary" title="チェックイン" show-adjacent-months></v-date-picker></v-dialog>
    <v-dialog v-model="pick.outOpen" width="auto"><v-date-picker :model-value="toDateObj(add.out)" @update:model-value="onPickOut" color="primary" title="チェックアウト" show-adjacent-months></v-date-picker></v-dialog>
    <v-dialog v-model="pick.eInOpen" width="auto"><v-date-picker :model-value="toDateObj(edit.in)" @update:model-value="onPickEditIn" color="primary" title="チェックイン" show-adjacent-months></v-date-picker></v-dialog>
    <v-dialog v-model="pick.eOutOpen" width="auto"><v-date-picker :model-value="toDateObj(edit.out)" @update:model-value="onPickEditOut" color="primary" title="チェックアウト" show-adjacent-months></v-date-picker></v-dialog>

    <!-- ボトムナビ -->
    <v-bottom-navigation v-model="tab" color="primary" grow :elevation="0" bg-color="surface" style="border-top:1px solid #ECEEF1">
      <v-btn value="today"><v-icon>mdi-star-outline</v-icon>今日</v-btn>
      <v-btn value="list"><v-icon>mdi-format-list-bulleted</v-icon>予約</v-btn>
      <v-btn value="calendar"><v-icon>mdi-calendar-month-outline</v-icon>カレンダー</v-btn>
      <v-btn value="msg"><v-icon>mdi-email-outline</v-icon>メッセ</v-btn>
    </v-bottom-navigation>

    <v-snackbar v-model="snack" timeout="2000" location="bottom">{{ snackText }}</v-snackbar>
  </template>
</v-app>
</script>
</body>
</html>
